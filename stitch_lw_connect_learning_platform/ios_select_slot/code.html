<script>
        function selectDate(element) {
            // Remove active classes from all date cards
            document.querySelectorAll('.date-card').forEach(card => {
                card.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'shadow-md', 'border-2', 'border-secondary', 'active-date');
                card.classList.add('bg-surface-container-lowest', 'border-outline-variant/30');
                
                // Reset text colors
                const labels = card.querySelectorAll('span');
                labels[0].classList.add('text-on-surface-variant');
                labels[0].classList.remove('text-on-secondary-container/80');
                labels[1].classList.add('text-on-surface');
            });

            // Add active classes to selected card
            element.classList.remove('bg-surface-container-lowest', 'border-outline-variant/30');
            element.classList.add('bg-secondary-container', 'text-on-secondary-container', 'shadow-md', 'border-2', 'border-secondary', 'active-date');
            
            const labels = element.querySelectorAll('span');
            labels[0].classList.remove('text-on-surface-variant');
            labels[0].classList.add('text-on-secondary-container/80');
            labels[1].classList.remove('text-on-surface');
        }

        function selectSlot(element) {
            // Remove active classes from all slots
            document.querySelectorAll('.slot-btn').forEach(btn => {
                btn.classList.remove('border-2', 'border-secondary', 'shadow-md', 'slot-active');
                btn.classList.add('border-outline-variant/30');
                
                const icon = btn.querySelector('.material-symbols-outlined');
                icon.innerText = 'radio_button_unchecked';
                icon.style.fontVariationSettings = "'FILL' 0";
                icon.classList.remove('text-secondary');
                icon.classList.add('text-outline-variant');
            });

            // Add active classes to selected slot
            element.classList.remove('border-outline-variant/30');
            element.classList.add('border-2', 'border-secondary', 'shadow-md', 'slot-active');
            
            const icon = element.querySelector('.material-symbols-outlined');
            icon.innerText = 'check_circle';
            icon.style.fontVariationSettings = "'FILL' 1";
            icon.classList.remove('text-outline-variant');
            icon.classList.add('text-secondary');

            // Haptic feedback simulation
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }
    </script>
